function NCLEXExtractor(){
  const cfg=useConfig();
  const [files,setFiles]=useState([]);
  const [mode,setMode]=useState('inline'); // 'inline' or 'split'
  const [chunkSize,setChunkSize]=useState(3000);
  const [overlap,setOverlap]=useState(800);
  const [pageCount,setPageCount]=useState(null);
  const [qRanges,setQRanges]=useState([{start:1,end:50}]);
  const [aRanges,setARanges]=useState([{start:51,end:100}]);
  const [batchSize,setBatchSize]=useState(8);
  const [status,setStatus]=useState('idle');
  const [progress,setProgress]=useState({current:0,total:0});
  const [questions,setQuestions]=useState([]);
  const [error,setError]=useState('');
  const [log,setLog]=useState([]);
  const [filterStrategy,setFilterStrategy]=useState('');
  const [filterDisease,setFilterDisease]=useState('');
  const abortRef=useRef(false);
  const fRef=useRef(null);

  const model=cfg.thinkingMode?cfg.proModel:cfg.flashModel;

  // Auto-detect page count when files change
  useEffect(()=>{
    if(!files.length){setPageCount(null);return;}
    getPdfPageCount(files[0]).then(n=>{setPageCount(n);const mid=Math.ceil(n/2);setQRanges([{start:1,end:mid}]);setARanges([{start:mid+1,end:n}]);}).catch(()=>setPageCount(null));
  },[files]);

  const allStrategies=useMemo(()=>[...new Set(questions.map(q=>q.test_taking_strategy).filter(Boolean))].sort(),[questions]);
  const filtered=useMemo(()=>questions.filter(q=>{
    if(filterStrategy&&q.test_taking_strategy!==filterStrategy)return false;
    if(filterDisease){const term=filterDisease.toLowerCase();if(!q.diseases_conditions?.some(d=>d.toLowerCase().includes(term))&&!q.question?.toLowerCase().includes(term))return false;}
    return true;
  }),[questions,filterStrategy,filterDisease]);

  const addLog=useCallback(msg=>setLog(p=>[...p,`[${new Date().toLocaleTimeString()}] ${msg}`]),[]);

  // Gemini call for NCLEX (with retry)
  async function nclexCallGemini(prompt){
    const gc={temperature:0.1,maxOutputTokens:8192};if(cfg.thinkingMode)gc.thinkingConfig={thinkingLevel:cfg.thinkingLevel};
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cfg.apiKey}`;
    for(let attempt=0;attempt<3;attempt++){
      try{
        const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:gc})});
        if((res.status===429||res.status>=500)&&attempt<2){await new Promise(r=>setTimeout(r,Math.pow(2,attempt+1)*1000));continue;}
        if(!res.ok)throw new Error('API '+res.status);
        const data=await res.json();const raw=data?.candidates?.[0]?.content?.parts?.filter(p=>p.text).map(p=>p.text).join('')||'[]';
        const cleaned=raw.replace(/```json\s*/gi,'').replace(/```/g,'').trim();
        try{return JSON.parse(cleaned);}catch{return[];}
      }catch(e){if(attempt===2)throw e;await new Promise(r=>setTimeout(r,1000));}
    }
  }

  // ── Inline mode runner ──
  async function runInline(file,existingQ){
    addLog(`📄 Extracting "${file.name}"...`);
    const text=await extractPdfTextSpaced(file);addLog(`  ${text.length.toLocaleString()} chars`);
    const chunks=nclexChunkText(text,chunkSize,overlap);addLog(`  ${chunks.length} chunks (size: ${chunkSize}, overlap: ${overlap})`);
    setProgress({current:0,total:chunks.length});let allQ=[...existingQ];
    for(let i=0;i<chunks.length;i++){
      if(abortRef.current){addLog('⚠ Aborted.');break;}
      addLog(`  Chunk ${i+1}/${chunks.length}...`);
      try{
        const result=await nclexCallGemini(NCLEX_INLINE_PROMPT+chunks[i]);
        if(Array.isArray(result)&&result.length>0){allQ=nclexDedup([...allQ,...result]);setQuestions([...allQ]);addLog(`    ✓ ${result.length} found → ${allQ.length} unique`);}else addLog(`    — No questions.`);
      }catch(e){addLog(`    ⚠ ${e.message}`);}
      setProgress({current:i+1,total:chunks.length});if(i<chunks.length-1)await new Promise(r=>setTimeout(r,500));
    }
    return allQ;
  }

  // ── Split Q&A mode runner ──
  async function runSplit(file,existingQ){
    addLog(`📄 Extracting QUESTION pages from "${file.name}"...`);
    let qText='';for(const r of qRanges){addLog(`  Pages ${r.start}–${r.end}`);qText+=await nclexExtractPageRange(file,r.start,r.end)+'\n\n';}
    addLog(`  → ${qText.length.toLocaleString()} chars`);
    addLog(`📄 Extracting ANSWER pages...`);
    let aText='';for(const r of aRanges){addLog(`  Pages ${r.start}–${r.end}`);aText+=await nclexExtractPageRange(file,r.start,r.end)+'\n\n';}
    addLog(`  → ${aText.length.toLocaleString()} chars`);
    addLog(`🔗 Pairing by question number...`);
    let pairs=nclexPairQA(qText,aText);
    const matched=pairs.filter(p=>p.matched).length;
    addLog(`  → Regex found ${pairs.length} questions, ${matched} matched, ${pairs.length-matched} unmatched`);
    // AI fallback if regex found too few
    if(pairs.length<3||(pairs.length>0&&matched/pairs.length<0.3)){
      addLog('🤖 Regex found too few — using AI to pair...');
      try{
        const prompt=NCLEX_AI_PAIR_PROMPT+qText.slice(0,12000)+'\n\nANSWERS SECTION:\n'+aText.slice(0,12000);
        const aiResult=await nclexCallGemini(prompt);
        if(Array.isArray(aiResult)&&aiResult.length>pairs.length){
          pairs=aiResult.map(r=>({number:r.number||0,question:r.question||'',answer:r.answer||'',matched:!!r.answer}));
          addLog(`  → AI paired ${pairs.length} questions (better than regex)`);
        }
      }catch(e){addLog(`  ⚠ AI pairing failed: ${e.message}`);}
    }
    if(!pairs.length){addLog('⚠ No numbered questions detected. Try adjusting page ranges or Inline mode.');return existingQ;}
    const batches=nclexBatchPairs(pairs,batchSize);
    addLog(`Sending ${batches.length} batches of ~${batchSize} to ${model}...`);
    setProgress({current:0,total:batches.length});let allQ=[...existingQ];
    for(let i=0;i<batches.length;i++){
      if(abortRef.current){addLog('⚠ Aborted.');break;}
      const batch=batches[i];addLog(`  Batch ${i+1}/${batches.length} (Q#${batch[0].number}–#${batch[batch.length-1].number})...`);
      try{
        const result=await nclexCallGemini(NCLEX_SPLIT_PROMPT+nclexPairsToText(batch));
        if(Array.isArray(result)&&result.length>0){allQ=nclexDedup([...allQ,...result]);setQuestions([...allQ]);addLog(`    ✓ ${result.length} → ${allQ.length} unique`);}else addLog(`    — No output.`);
      }catch(e){addLog(`    ⚠ ${e.message}`);}
      setProgress({current:i+1,total:batches.length});if(i<batches.length-1)await new Promise(r=>setTimeout(r,500));
    }
    return allQ;
  }

  const run=useCallback(async()=>{
    if(!cfg.apiKey||!files.length)return;abortRef.current=false;setError('');setQuestions([]);setLog([]);setStatus('processing');
    try{
      addLog(`Mode: ${mode==='inline'?'Inline (Q+A together)':'Split Q&A (separated sections)'}${cfg.thinkingMode?` · Thinking: ${cfg.thinkingLevel}`:''}`);
      addLog(`Processing ${files.length} PDF(s)...`);
      let allQ=[];
      for(let fi=0;fi<files.length;fi++){
        if(abortRef.current)break;
        addLog(`\n📁 File ${fi+1}/${files.length}: ${files[fi].name}`);
        if(mode==='inline')allQ=await runInline(files[fi],allQ);
        else allQ=await runSplit(files[fi],allQ);
      }
      addLog(`✅ Done! ${allQ.length} unique questions from ${files.length} file(s).`);setStatus('done');
    }catch(e){setError(e.message);setStatus('error');addLog(`❌ ${e.message}`);}
  },[cfg,files,mode,chunkSize,overlap,qRanges,aRanges,batchSize,model,addLog]);

  const exportTxt=()=>{
    let out='';filtered.forEach((q,i)=>{out+=`${i+1}. ${q.question}\n\nAnswer: ${q.correct_answer}\nRationale: ${q.rationale}\n${q.test_taking_strategy?'Strategy: '+q.test_taking_strategy+'\n':''}${q.diseases_conditions?.length?'Conditions: '+q.diseases_conditions.join(', ')+'\n':''}\n---\n\n`;});
    downloadBlob(new Blob([out],{type:'text/plain'}),'nclex_questions.txt');
  };

  const nclexToMd=()=>{
    let out='# NCLEX Practice Questions\n\n';
    filtered.forEach((q,i)=>{
      out+=`**${i+1}.** ${q.question}\n\n`;
      out+=`**Answer:** ${q.correct_answer}\n\n`;
      out+=`${q.rationale}\n\n`;
      if(q.priority_nursing_tip)out+=`> ⚡ **Tip:** ${q.priority_nursing_tip}\n\n`;
      if(q.test_taking_strategy)out+=`> 🎯 **Strategy:** ${q.test_taking_strategy}\n\n`;
      if(q.clinical_judgment_skill)out+=`> 🧠 **CJ:** ${q.clinical_judgment_skill}\n\n`;
      if(q.diseases_conditions?.length)out+=`Conditions: ${q.diseases_conditions.join(', ')}\n\n`;
      out+=`---\n\n`;
    });
    return out;
  };
  const exportMd=()=>downloadBlob(new Blob([nclexToMd()],{type:'text/markdown'}),'nclex_questions.md');
  const copyAll=()=>navigator.clipboard?.writeText(nclexToMd());
  const exportPdf=()=>exportAsPdf(nclexToMd(),'NCLEX Practice Questions',`${filtered.length} questions`);

  const isProcessing=status==='processing';

  return(
    <div className="tool-panel">
      <h2 className="tool-title">NCLEX Question Extractor</h2>
      <p className="tool-desc">Upload nursing review PDFs → extracted practice questions with rationales, strategies, and disease tagging</p>

      {/* Mode Toggle */}
      <div style={{display:'flex',gap:0,marginBottom:14,borderRadius:10,overflow:'hidden',border:'1px solid var(--border)'}}>
        {[{id:'inline',icon:'📄',title:'Inline Mode',desc:'Q & A together on same pages'},{id:'split',icon:'📑',title:'Split Q&A Mode',desc:'Questions & answers on separate pages (Davis-style)'}].map(m=>
          <button key={m.id} onClick={()=>setMode(m.id)} style={{flex:1,padding:'12px 14px',border:'none',cursor:'pointer',background:mode===m.id?'var(--bg-card)':'var(--bg-input)',borderRight:m.id==='inline'?'1px solid var(--border)':'none',textAlign:'left',transition:'background .15s'}}>
            <div style={{fontSize:13,fontWeight:600,color:mode===m.id?'var(--text-bright)':'var(--text-dim)'}}>{m.icon} {m.title}</div>
            <div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>{m.desc}</div>
          </button>
        )}
      </div>

      {/* Config */}
      <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:18,marginBottom:14}}>
        {/* Inline settings */}
        {mode==='inline'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div className="sb-field"><label>Chunk Size (chars)</label><input type="number" min={500} max={15000} value={chunkSize} onChange={e=>setChunkSize(Number(e.target.value))}/></div>
          <div className="sb-field"><label>Overlap (chars)</label><input type="number" min={0} max={5000} value={overlap} onChange={e=>setOverlap(Number(e.target.value))}/><div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>~800 = 1-2 pages. Duplicates auto-removed.</div></div>
        </div>}

        {/* Split settings */}
        {mode==='split'&&<div style={{marginBottom:12}}>
          <div style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:10}}>
            <div style={{fontSize:11,color:'var(--accent-warm)',fontWeight:600,marginBottom:6}}>📑 For PDFs like Davis Test Success where questions and answers are in separate sections.</div>
            <div style={{fontSize:11,color:'var(--text-dim)',lineHeight:1.5,marginBottom:8}}>Specify which pages contain <strong style={{color:'var(--text)'}}>questions</strong> and which contain <strong style={{color:'var(--text)'}}>answers/rationales</strong>. The tool pairs them by question number before sending to Gemini.</div>
            {pageCount&&<div style={{fontSize:10,color:'var(--accent)',marginBottom:8}}>📖 This PDF has <b>{pageCount}</b> pages</div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{padding:8,background:'var(--bg-card)',borderRadius:6,border:'1px solid var(--border)'}}><PageRangeSection label="📝 Question Pages" ranges={qRanges} onChange={setQRanges} maxPages={pageCount}/></div>
              <div style={{padding:8,background:'var(--bg-card)',borderRadius:6,border:'1px solid var(--border)'}}><PageRangeSection label="✅ Answer Pages" ranges={aRanges} onChange={setARanges} maxPages={pageCount}/></div>
            </div>
            <div style={{marginTop:8}}>
              <div className="sb-field"><label>Questions per batch</label><input type="number" min={2} max={25} value={batchSize} onChange={e=>setBatchSize(Number(e.target.value))} style={{width:90}}/><span style={{fontSize:10,color:'var(--text-dim)',marginLeft:6}}>Lower = more reliable</span></div>
            </div>
          </div>
        </div>}

        {/* Upload */}
        <div className="upload-zone" onClick={()=>fRef.current?.click()} onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('dragover');}} onDragLeave={e=>e.currentTarget.classList.remove('dragover')} onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('dragover');const nf=Array.from(e.dataTransfer.files).filter(f=>f.type==='application/pdf');setFiles(p=>[...p,...nf]);}}>
          <input ref={fRef} type="file" accept=".pdf" multiple style={{display:'none'}} onChange={e=>{setFiles(p=>[...p,...Array.from(e.target.files)]);e.target.value='';}}/>
          <div style={{fontSize:28,marginBottom:4,opacity:.6}}>📋</div>
          <p style={{fontSize:12,color:'var(--text)'}}>Drop PDFs or <strong style={{color:'var(--accent)'}}>click to browse</strong></p>
        </div>
        {files.map((f,i)=><div className="file-chip" key={i}><div className="f-icon pdf">PDF</div><span className="f-name">{f.name}</span><span className="f-size">{formatSize(f.size)}</span><button className="f-rm" onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))}>×</button></div>)}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button className="btn-primary" onClick={run} disabled={!cfg.apiKey||!files.length||isProcessing}>{isProcessing?'⏳ Processing...':`🚀 Extract from ${files.length||0} PDF${files.length!==1?'s':''}`}</button>
          {isProcessing&&<button className="btn-danger" onClick={()=>abortRef.current=true}>Abort</button>}
          {files.length>0&&!isProcessing&&<button className="btn-secondary" onClick={()=>setFiles([])}>Clear</button>}
        </div>
      </div>

      {error&&<div className="error-banner"><span>❌</span>{error}</div>}

      {/* Progress */}
      {(isProcessing||log.length>0)&&<div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16,marginBottom:14}}>
        {progress.total>0&&<div className="progress-bar" style={{marginBottom:6}}><div className="progress-fill" style={{width:`${(progress.current/progress.total)*100}%`}}/></div>}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-dim)',marginBottom:6}}>
          <span>{isProcessing?(mode==='split'?`Batch ${progress.current}/${progress.total}`:`Chunk ${progress.current}/${progress.total}`):'Done'}</span>
          <span style={{color:'var(--accent)'}}>{questions.length} questions</span>
        </div>
        <div style={{maxHeight:140,overflowY:'auto',background:'var(--bg-deep)',borderRadius:5,padding:7,fontSize:10,fontFamily:'JetBrains Mono',color:'var(--text-dim)',lineHeight:1.7}}>{log.map((l,i)=><div key={i}>{l}</div>)}</div>
      </div>}

      {/* Results */}
      {questions.length>0&&<>
        <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16,marginBottom:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div className="sb-field"><label>Filter by Strategy</label><select value={filterStrategy} onChange={e=>setFilterStrategy(e.target.value)}><option value="">All ({allStrategies.length})</option>{allStrategies.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
            <div className="sb-field"><label>Search Disease/Keyword</label><input type="text" placeholder="e.g. Heart Failure" value={filterDisease} onChange={e=>setFilterDisease(e.target.value)}/></div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'var(--text-dim)'}}>Showing <b style={{color:'var(--accent)'}}>{filtered.length}</b> of {questions.length}</span>
            {(filterStrategy||filterDisease)&&<button className="btn-secondary" style={{padding:'3px 8px',fontSize:10}} onClick={()=>{setFilterStrategy('');setFilterDisease('');}}>Clear filters</button>}
            <div style={{flex:1}}/>
            <button className="btn-secondary" onClick={copyAll}>📋 Copy</button>
            <button className="btn-secondary" onClick={exportMd}>⬇ .md</button>
            <button className="btn-secondary" onClick={exportTxt}>📝 .txt</button>
            <button className="btn-secondary" onClick={exportPdf}>⬇ PDF</button>
          </div>
        </div>
        {filtered.map((q,i)=><NCLEXQuestionCard key={i} q={q} index={i}/>)}
      </>}

      {status==='idle'&&questions.length===0&&<div style={{textAlign:'center',padding:'40px 16px',color:'var(--text-dim)'}}>
        <div style={{fontSize:40,marginBottom:10}}>📋</div>
        <div style={{fontSize:14,marginBottom:6}}>Upload NCLEX review PDFs to extract practice questions</div>
        <div style={{fontSize:11,maxWidth:460,margin:'0 auto',lineHeight:1.6}}>
          Two modes: <strong style={{color:'var(--text)'}}>Inline</strong> for books where Q&A are on the same pages.
          <strong style={{color:'var(--text)'}}> Split Q&A</strong> for books like Davis Test Success where questions and answers are in separate sections.
          Multi-pattern question detection with AI fallback pairing.
        </div>
      </div>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CONFIG SIDEBAR
   ═══════════════════════════════════════════════════════ */
function ConfigSidebar(){
  const cfg=useConfig();
  return(
    <div className="config-sidebar">
      <div className="sb-header"><h2>Configuration</h2><p>Shared across all tools</p></div>
      <div className="sb-section">
        <div className="sb-label">Gemini API Key</div>
        <div className="sb-field">
          <input type="password" value={cfg.apiKey} onChange={e=>cfg.setApiKey(e.target.value)} placeholder="AIza..." spellCheck="false"/>
          <div className="sb-hint">Session-stored. Sent only to Google's API.</div>
        </div>
      </div>
      <div className="sb-section">
        <div className="sb-label">Model Settings</div>
        <div className="toggle-row">
          <span>{cfg.thinkingMode?'\uD83E\uDDE0 Thinking':'⚡ Standard'}</span>
          <div className={`toggle-switch ${cfg.thinkingMode?'on':''}`} onClick={()=>cfg.setThinkingMode(t=>!t)}/>
        </div>
        {cfg.thinkingMode&&(
          <div style={{marginTop:6}}>
            <label style={{fontSize:10,color:'var(--text-dim)',display:'block',marginBottom:4,fontWeight:500}}>Thinking Level</label>
            <div className="level-pills">
              {['low','medium','high'].map(lv=>(
                <button key={lv} className={`level-pill ${cfg.thinkingLevel===lv?'on':''}`} onClick={()=>cfg.setThinkingLevel(lv)}>{lv}</button>
              ))}
            </div>
          </div>
        )}
        <div className="model-badge"><div className={`model-dot ${cfg.thinkingMode?'pro':''}`}/><span style={{flex:1}}>{cfg.thinkingMode?cfg.proModel:cfg.flashModel}</span><span style={{fontSize:9,color:'var(--text-dim)'}}>active</span></div>
        <div style={{marginTop:10}}>
          <div className="sb-field"><label>Flash Model</label><input type="text" value={cfg.flashModel} onChange={e=>cfg.setFlashModel(e.target.value)} spellCheck="false"/></div>
          <div className="sb-field"><label>Pro Model</label><input type="text" value={cfg.proModel} onChange={e=>cfg.setProModel(e.target.value)} spellCheck="false"/></div>
        </div>
      </div>
      <div className="sb-section">
        <div className="sb-label">Pipeline Info</div>
        <div className="sb-hint">
          <strong style={{color:'var(--text)'}}>Extraction</strong> <span style={{color:'var(--accent)'}}>{cfg.flashModel}</span><br/>
          Fast per-file/chunk data harvest.<br/><br/>
          <strong style={{color:'var(--text)'}}>Synthesis</strong> <span style={{color:cfg.thinkingMode?'var(--accent-warm)':'var(--accent)'}}>{cfg.thinkingMode?cfg.proModel:cfg.flashModel}{cfg.thinkingMode?` · ${cfg.thinkingLevel}`:''}</span><br/>
          Final output generation.
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════════════════ */
function App(){
  const [apiKey,setApiKey]=useState(()=>{try{return sessionStorage.getItem('suite_key')||'';}catch{return'';}});
  const [flashModel,setFlashModel]=useState('gemini-3-flash-preview');
  const [proModel,setProModel]=useState('gemini-3.1-pro-preview');
  const [thinkingMode,setThinkingMode]=useState(false);
  const [thinkingLevel,setThinkingLevel]=useState('high');
  const [activeTool,setActiveTool]=useState('guide');
  const [showConfig,setShowConfig]=useState(true);

  useEffect(()=>{try{if(apiKey)sessionStorage.setItem('suite_key',apiKey);}catch{}},[apiKey]);

  const cfg={apiKey,setApiKey,flashModel,setFlashModel,proModel,setProModel,thinkingMode,setThinkingMode,thinkingLevel,setThinkingLevel,activeModel:thinkingMode?proModel:flashModel};

  const ToolComponent={guide:StudyGuideGenerator,priority:PriorityAnalyzer,anki:AnkiGenerator,merger:DeckMerger,nclex:NCLEXExtractor}[activeTool]||StudyGuideGenerator;

  return(
    <ConfigCtx.Provider value={cfg}>
      <div className="suite-shell">
        {/* Nav Rail */}
        <div className="nav-rail">
          <div className="nav-logo" title="LATTE Study Suite">L</div>
          {TOOLS.map(t=>(
            <button key={t.id} className={`nav-btn ${activeTool===t.id?'active':''}`} onClick={()=>setActiveTool(t.id)} title={t.title}>
              <t.icon/>{t.label}
            </button>
          ))}
          <div className="nav-spacer"/>
          <button className={`nav-btn nav-btn-cfg ${showConfig?'active':''}`} onClick={()=>setShowConfig(s=>!s)} title="Toggle config sidebar">
            <NavIcons.gear/>Config
          </button>
        </div>

        {/* Config Sidebar */}
        {showConfig&&<ConfigSidebar/>}

        {/* Main Content */}
        <div className="main-area">
          <ToolComponent key={activeTool}/>
        </div>
      </div>
    </ConfigCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

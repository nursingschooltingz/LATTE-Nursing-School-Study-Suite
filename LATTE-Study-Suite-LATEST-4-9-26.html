<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LATTE Study Suite</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-deep: #08090f;
  --bg-surface: #10121a;
  --bg-card: #161924;
  --bg-card-alt: #1c2030;
  --bg-input: #0e1018;
  --bg-hover: #222638;
  --border: #1f2338;
  --border-focus: #4a7ff7;
  --accent: #4a7ff7;
  --accent-glow: rgba(74,127,247,0.12);
  --accent2: #a78bfa;
  --accent-warm: #f0a83a;
  --accent-green: #34d399;
  --accent-red: #f87171;
  --text: #cdd2e0;
  --text-dim: #7b82a0;
  --text-bright: #eaecf4;
  --radius: 8px;
  --radius-lg: 12px;
  --nav-width: 64px;
  --sidebar-width: 320px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::selection{background:var(--accent);color:#fff;}

/* ─── Shell Layout ─── */
.suite-shell{display:flex;height:100vh;overflow:hidden;}

/* ─── Nav Rail ─── */
.nav-rail{width:var(--nav-width);min-width:var(--nav-width);background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;z-index:10;}
.nav-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:800;font-size:17px;color:#fff;margin-bottom:12px;flex-shrink:0;}
.nav-btn{width:44px;height:44px;border-radius:10px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:'DM Sans',sans-serif;font-size:8px;font-weight:600;letter-spacing:.3px;transition:all .15s;position:relative;}
.nav-btn:hover{background:var(--bg-hover);color:var(--text);}
.nav-btn.active{background:var(--accent-glow);color:var(--accent);}
.nav-btn.active::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 3px 3px 0;background:var(--accent);}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.nav-spacer{flex:1;}
.nav-btn-cfg{margin-top:auto;margin-bottom:8px;}

/* ─── Sidebar ─── */
.config-sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;max-height:100vh;}
.sb-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.sb-header h2{font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:-.2px;}
.sb-header p{font-size:11px;color:var(--text-dim);margin-top:2px;}
.sb-section{padding:14px 18px;border-bottom:1px solid var(--border);}
.sb-section:last-child{border-bottom:none;}
.sb-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-dim);margin-bottom:8px;}
.sb-field{margin-bottom:10px;}
.sb-field:last-child{margin-bottom:0;}
.sb-field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;font-weight:500;}
input[type="text"],input[type="password"],input[type="number"],select{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11.5px;transition:border-color .2s;outline:none;}
input:focus,select:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-glow);}
textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.55;resize:vertical;min-height:60px;outline:none;transition:border-color .2s;}
textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-glow);}
textarea::placeholder{color:#3a3f54;}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.toggle-row span{font-size:12px;font-weight:500;}
.toggle-switch{width:38px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;}
.toggle-switch.on{background:var(--accent);}
.toggle-switch::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .25s;}
.toggle-switch.on::after{transform:translateX(18px);}

/* Level picker */
.level-pills{display:flex;gap:3px;}
.level-pill{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:3px 9px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;text-transform:uppercase;}
.level-pill:hover{border-color:var(--text-dim);color:var(--text);}
.level-pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Model info */
.model-badge{margin-top:6px;padding:6px 8px;background:var(--bg-input);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);display:flex;align-items:center;gap:5px;}
.model-dot{width:5px;height:5px;border-radius:50%;background:var(--accent-green);flex-shrink:0;}
.model-dot.pro{background:var(--accent-warm);}

/* Hint */
.sb-hint{font-size:10px;color:var(--text-dim);line-height:1.5;margin-top:4px;}

/* ─── Main Content Area ─── */
.main-area{flex:1;overflow-y:auto;max-height:100vh;}

/* ─── Shared UI components ─── */
.btn-primary{padding:11px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:all .2s;letter-spacing:.2px;}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-secondary{padding:8px 14px;background:var(--bg-card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;}
.btn-secondary:hover:not(:disabled){border-color:var(--text-dim);background:var(--bg-hover);}
.btn-danger{padding:8px 14px;background:rgba(248,113,113,.08);color:var(--accent-red);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;border:1px solid rgba(248,113,113,.2);border-radius:6px;cursor:pointer;transition:all .15s;}
.btn-danger:hover:not(:disabled){background:rgba(248,113,113,.15);}

/* Upload zone shared */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:32px 20px;text-align:center;cursor:pointer;transition:all .25s;background:var(--bg-card);}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-glow);}
.upload-zone svg{width:36px;height:36px;margin-bottom:8px;color:var(--text-dim);}
.upload-zone h3{font-size:14px;font-weight:600;margin-bottom:3px;color:var(--text);}
.upload-zone p{font-size:11px;color:var(--text-dim);}

/* File chips */
.file-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:5px;}
.file-chip .f-icon{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;text-transform:uppercase;flex-shrink:0;}
.f-icon.pdf{background:rgba(248,113,113,.12);color:#f87171;}
.f-icon.pptx{background:rgba(249,115,22,.12);color:#fb923c;}
.f-icon.txt{background:rgba(148,163,184,.12);color:#94a3b8;}
.file-chip .f-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.file-chip .f-size{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.file-chip .f-rm{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:0 2px;}
.file-chip .f-rm:hover{color:var(--accent-red);}

/* Progress */
.progress-bar{height:5px;background:var(--bg-input);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s ease;background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* Chunk list */
.chunk-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-card);border-radius:5px;font-size:11px;border:1px solid var(--border);margin-bottom:4px;}
.chunk-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.chunk-dot.pending{border:2px solid var(--border);}
.chunk-dot.running{border:2px solid var(--accent);animation:pulse 1.2s infinite;}
.chunk-dot.done{background:var(--accent-green);color:#0a0f1a;}
.chunk-dot.error{background:var(--accent-red);color:white;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* Output container */
.output-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.output-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg-card-alt);flex-wrap:wrap;gap:6px;}
.output-toolbar h3{font-size:13px;font-weight:600;color:var(--text-bright);}
.output-toolbar-actions{display:flex;gap:6px;flex-wrap:wrap;}
.output-body{padding:20px;max-height:65vh;overflow-y:auto;line-height:1.7;font-size:13px;}
.output-body h1,.output-body h2,.output-body h3,.output-body h4{color:var(--text-bright);margin:16px 0 8px;line-height:1.3;}
.output-body h1{font-size:20px;font-family:'Playfair Display',serif;}
.output-body h2{font-size:16px;border-bottom:1px solid var(--border);padding-bottom:5px;}
.output-body h3{font-size:14px;color:var(--accent);}
.output-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:11px;}
.output-body th{background:var(--bg-card-alt);padding:7px 9px;text-align:left;font-weight:600;border:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px;}
.output-body td{padding:7px 9px;border:1px solid var(--border);vertical-align:top;}
.output-body tr:nth-child(even){background:rgba(255,255,255,.015);}
.output-body ul,.output-body ol{padding-left:18px;margin:6px 0;}
.output-body li{margin-bottom:3px;}
.output-body code{font-family:'JetBrains Mono',monospace;background:var(--bg-input);padding:1px 4px;border-radius:3px;font-size:11px;}
.output-body pre{background:var(--bg-input);padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0;}
.output-body pre code{background:none;padding:0;}
.output-body strong{color:var(--text-bright);}
.output-body blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--text-dim);margin:10px 0;}

/* Error */
.error-banner{padding:10px 14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:var(--radius);color:var(--accent-red);font-size:12px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start;}

/* Tip banner */
.tip-banner{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;background:rgba(240,168,58,.06);border:1px solid rgba(240,168,58,.18);border-radius:var(--radius);font-size:11px;color:var(--accent-warm);margin-bottom:16px;line-height:1.5;}

/* ─── Tool-specific panels (each tool wraps in .tool-panel) ─── */
.tool-panel{padding:24px 32px;min-height:100vh;}
.tool-panel h2.tool-title{font-size:18px;font-weight:700;color:var(--text-bright);margin-bottom:4px;letter-spacing:-.3px;}
.tool-panel .tool-desc{font-size:12px;color:var(--text-dim);margin-bottom:20px;}
.field-block{margin-bottom:16px;}
.field-block label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text);}
.field-block .badge-req{font-size:9px;font-weight:600;color:var(--accent-warm);text-transform:uppercase;letter-spacing:.8px;background:rgba(240,168,58,.1);padding:2px 7px;border-radius:3px;}
.field-block .badge-opt{font-size:9px;font-weight:400;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;background:var(--bg-card-alt);padding:2px 7px;border-radius:3px;}

/* Extraction toggle */
.ext-toggle{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;margin-bottom:14px;user-select:none;}
.ext-toggle:hover{border-color:var(--text-dim);}
.ext-toggle .arrow{transition:transform .2s;font-size:9px;}
.ext-toggle .arrow.open{transform:rotate(90deg);}
.ext-viewer{background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:16px;max-height:250px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.5;white-space:pre-wrap;color:var(--text-dim);}
.retry-banner{padding:10px 14px;background:rgba(74,127,247,.06);border:1px solid rgba(74,127,247,.18);border-radius:var(--radius);font-size:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}

/* Format options */
.format-opt{padding:8px 10px;border-radius:6px;cursor:pointer;transition:all .15s;margin-bottom:4px;}
.format-opt .fo-head{display:flex;align-items:center;gap:6px;}
.format-opt .fo-desc{font-size:9px;color:var(--text-dim);margin-top:3px;padding-left:20px;line-height:1.3;}

/* ─── NCLEX-specific ─── */
.nclex-card{border:1px solid var(--border);border-radius:10px;background:var(--bg-card);margin-bottom:12px;overflow:hidden;transition:box-shadow .2s;}
.nclex-card.open{box-shadow:0 0 0 1px var(--accent-glow),0 4px 16px rgba(0,0,0,.25);}
.nclex-header{width:100%;padding:10px 14px;background:none;border:none;cursor:pointer;display:flex;align-items:flex-start;gap:8px;text-align:left;}
.nclex-qnum{background:rgba(74,127,247,.1);color:var(--accent);font-weight:700;font-size:10px;padding:2px 7px;border-radius:5px;flex-shrink:0;margin-top:2px;}
.nclex-body{padding:0 14px 14px;}

/* ─── Anki table view ─── */
.anki-tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg);}
.anki-tbl-wrap table{width:100%;border-collapse:collapse;}
.anki-tbl-wrap thead{background:var(--bg-card-alt);}
.anki-tbl-wrap th{padding:8px 10px;font-size:9.5px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;text-align:left;border-bottom:1px solid var(--border);}
.anki-tbl-wrap td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
.anki-tbl-wrap tr:last-child td{border-bottom:none;}
.anki-tbl-wrap tr.dim{opacity:.35;}
.cell-ta{width:100%;background:var(--bg-input);border:1px solid transparent;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:5px 7px;border-radius:5px;resize:none;outline:none;line-height:1.5;transition:border .2s;}
.cell-ta:focus{border-color:var(--border-focus);}
.cell-ta.tags-ta{color:var(--accent);font-size:10px;}

/* Tier badges */
.tier-badge{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.2px;line-height:1;white-space:nowrap;flex-shrink:0;}
.tier-badge.t1{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.2);}
.tier-badge.t2{background:rgba(240,168,58,.1);color:#fde68a;border:1px solid rgba(240,168,58,.2);}
.tier-badge.t3{background:rgba(74,127,247,.1);color:#93c5fd;border:1px solid rgba(74,127,247,.2);}
.tier-btn{display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;transition:.15s;}
.tier-btn b{font-weight:700;}
.tier-btn:hover{border-color:var(--text-dim);color:var(--text);}
.tier-btn.t1.active{background:rgba(248,113,113,.1);color:#fca5a5;border-color:rgba(248,113,113,.25);}
.tier-btn.t2.active{background:rgba(240,168,58,.08);color:#fde68a;border-color:rgba(240,168,58,.2);}
.tier-btn.t3.active{background:var(--bg-hover);color:var(--text);border-color:var(--text-dim);}

/* Deck Merger stat box */
.stat-box{background:var(--bg-card-alt);border-radius:6px;padding:10px 14px;text-align:center;}
.stat-box .stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
.stat-box .stat-lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}

/* Priority Analyzer tier sections */
.tier-section{border-radius:var(--radius-lg);padding:18px 20px;border:1px solid;margin-bottom:14px;}
.tier-section.t1{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.25);}
.tier-section.t2{background:rgba(251,191,36,.05);border-color:rgba(251,191,36,.2);}
.tier-section.t3{background:rgba(96,165,250,.05);border-color:rgba(96,165,250,.18);}
.tier-section .tier-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.tier-section .tier-title{font-size:13px;font-weight:600;}
.tier-section.t1 .tier-title{color:#fca5a5;}
.tier-section.t2 .tier-title{color:#fde68a;}
.tier-section.t3 .tier-title{color:#93c5fd;}
.tier-section .tier-body{font-size:13px;line-height:1.7;color:var(--text);}
.tier-section .tier-body h1,.tier-section .tier-body h2,.tier-section .tier-body h3,.tier-section .tier-body h4{color:var(--text-bright);margin:12px 0 5px;}
.tier-section .tier-body ul,.tier-section .tier-body ol{padding-left:18px;margin:6px 0;}
.tier-section .tier-body li{margin-bottom:4px;}
.tier-section .tier-body strong{color:var(--text-bright);}
.tier-section .tier-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:11px;}
.tier-section .tier-body th,.tier-section .tier-body td{padding:6px 8px;border:1px solid var(--border);text-align:left;}
.tier-section .tier-body th{background:rgba(0,0,0,.2);color:var(--text-bright);font-weight:600;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .2s ease;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}

/* Responsive */
@media(max-width:900px){
  .suite-shell{flex-direction:column;}
  .nav-rail{width:100%;min-width:auto;flex-direction:row;max-height:56px;padding:8px 12px;overflow-x:auto;}
  .nav-logo{margin-bottom:0;margin-right:10px;}
  .nav-spacer{display:none;}
  .config-sidebar{width:100%;min-width:auto;max-height:none;position:static;}
  .main-area{max-height:none;}
  .tool-panel{padding:16px 14px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect,useMemo,createContext,useContext}=React;

/* ═══════════════════════════════════════════════════════
   SHARED CONFIG CONTEXT
   ═══════════════════════════════════════════════════════ */
const ConfigCtx=createContext();
function useConfig(){return useContext(ConfigCtx);}

/* ═══════════════════════════════════════════════════════
   SHARED UTILITIES
   ═══════════════════════════════════════════════════════ */
function formatSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}
function getExt(name){return name.split('.').pop().toLowerCase();}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function getMimeType(file){const n=file.name.toLowerCase();if(n.endsWith('.pdf'))return'application/pdf';if(n.endsWith('.pptx'))return'application/vnd.openxmlformats-officedocument.presentationml.presentation';if(n.endsWith('.ppt'))return'application/vnd.ms-powerpoint';return file.type||'application/octet-stream';}

// ═══════════════════════════════════════════
// Google File API — handles files > 20MB
// Uses resumable upload protocol, polls for processing, auto-cleanup
// ═══════════════════════════════════════════
const FILE_API_THRESHOLD = 15 * 1024 * 1024; // 15MB — use File API above this
const _uploadedFileRefs = []; // track for cleanup

async function uploadToFileAPI(apiKey, file) {
  const mime = getMimeType(file);
  // Step 1: Initiate resumable upload
  const startRes = await fetch(
    `https://generativelanguage.googleapis.com/upload/v1beta/files?key=${apiKey}`,
    {
      method: 'POST',
      headers: {
        'X-Goog-Upload-Protocol': 'resumable',
        'X-Goog-Upload-Command': 'start',
        'X-Goog-Upload-Header-Content-Length': file.size.toString(),
        'X-Goog-Upload-Header-Content-Type': mime,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ file: { displayName: file.name } }),
    }
  );
  if (!startRes.ok) {
    const err = await startRes.json().catch(() => ({}));
    throw new Error('File API upload start failed: ' + (err.error?.message || startRes.status));
  }
  const uploadUrl = startRes.headers.get('X-Goog-Upload-URL');
  if (!uploadUrl) throw new Error('File API did not return upload URL');

  // Step 2: Upload the actual bytes
  const uploadRes = await fetch(uploadUrl, {
    method: 'POST',
    headers: {
      'X-Goog-Upload-Offset': '0',
      'X-Goog-Upload-Command': 'upload, finalize',
    },
    body: file,
  });
  if (!uploadRes.ok) throw new Error('File API upload failed: ' + uploadRes.status);
  const fileInfo = await uploadRes.json();

  // Step 3: Poll until processing is complete
  let fileState = fileInfo.file;
  let polls = 0;
  const maxPolls = 60; // up to 2 minutes
  while (fileState.state === 'PROCESSING' && polls < maxPolls) {
    await new Promise(r => setTimeout(r, 2000));
    const checkRes = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/${fileState.name}?key=${apiKey}`
    );
    if (checkRes.ok) {
      fileState = await checkRes.json();
    }
    polls++;
  }
  if (fileState.state === 'PROCESSING') throw new Error('File API: file still processing after timeout');
  if (fileState.state === 'FAILED') throw new Error('File API: file processing failed');

  // Track for cleanup
  _uploadedFileRefs.push({ name: fileState.name, apiKey });

  return { uri: fileState.uri, name: fileState.name, mimeType: mime };
}

// Prepare a file part for Gemini — auto-selects inline_data vs File API based on size
async function prepareFilePart(apiKey, file, onStatus) {
  if (file.size > FILE_API_THRESHOLD) {
    // Large file → use File API
    if (onStatus) onStatus(`Uploading "${file.name}" via File API (${formatSize(file.size)})...`);
    const uploaded = await uploadToFileAPI(apiKey, file);
    if (onStatus) onStatus(`"${file.name}" uploaded and ready.`);
    return { file_data: { file_uri: uploaded.uri, mime_type: uploaded.mimeType } };
  } else {
    // Small file → inline base64 (faster, no upload step)
    const base64 = await fileToBase64(file);
    const mime = getMimeType(file);
    return { inline_data: { mime_type: mime, data: base64 } };
  }
}

// Cleanup: delete uploaded files from Google's temporary storage
async function cleanupUploadedFiles() {
  for (const ref of _uploadedFileRefs) {
    try {
      await fetch(
        `https://generativelanguage.googleapis.com/v1beta/${ref.name}?key=${ref.apiKey}`,
        { method: 'DELETE' }
      );
    } catch (e) { /* ignore cleanup errors */ }
  }
  _uploadedFileRefs.length = 0;
}

async function callGemini(apiKey,model,parts,useThinking,thinkingLevel,signal,retries=2){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const body={contents:[{parts}],generationConfig:{maxOutputTokens:65536}};
  if(useThinking)body.generationConfig.thinkingConfig={thinkingLevel};
  for(let attempt=0;attempt<=retries;attempt++){
    try{
      const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal});
      if(!resp.ok){const err=await resp.json().catch(()=>({}));const msg=err.error?.message||`API error ${resp.status}`;if((resp.status===429||resp.status>=500)&&attempt<retries){await new Promise(r=>setTimeout(r,Math.pow(2,attempt+1)*1000+Math.random()*1000));continue;}throw new Error(msg);}
      const data=await resp.json();
      if(data.candidates?.[0]?.finishReason==='SAFETY')throw new Error('Response blocked by safety filters.');
      let text='';if(data.candidates?.[0]?.content?.parts){for(const part of data.candidates[0].content.parts){if(part.text&&!part.thought)text+=part.text;}}
      if(!text.trim()){if(attempt<retries){await new Promise(r=>setTimeout(r,2000));continue;}throw new Error('Empty response from API.');}
      return text;
    }catch(err){if(err.name==='AbortError')throw err;if(attempt===retries)throw err;await new Promise(r=>setTimeout(r,Math.pow(2,attempt+1)*1000));}
  }
}

// JSON-returning variant
async function callGeminiJSON(apiKey,model,prompt,thinkingLevel,retries=2){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const gc={temperature:0.2,maxOutputTokens:65536};
  if(thinkingLevel)gc.thinkingConfig={thinkingLevel};
  for(let attempt=0;attempt<=retries;attempt++){
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:gc})});
      if(!res.ok){const e=await res.json().catch(()=>({}));if((res.status===429||res.status>=500)&&attempt<retries){await new Promise(r=>setTimeout(r,Math.pow(2,attempt+1)*1000));continue;}throw new Error(e.error?.message||'API '+res.status);}
      const d=await res.json();const raw=d.candidates?.[0]?.content?.parts?.filter(p=>p.text&&!p.thought).map(p=>p.text).join('\n')||'';return raw;
    }catch(err){if(attempt===retries)throw err;await new Promise(r=>setTimeout(r,Math.pow(2,attempt+1)*1000));}
  }
}

function extractJSON(text){
  const fm=text.match(/```(?:json)?\s*([\s\S]*?)```/);if(fm)try{return JSON.parse(fm[1].trim());}catch(e){}
  const bs=text.indexOf('{'),bk=text.indexOf('[');const start=Math.min(bs>=0?bs:Infinity,bk>=0?bk:Infinity);
  if(start===Infinity)throw new Error('No JSON found.');
  const opener=text[start],closer=opener==='{'?'}':']';let depth=0;
  for(let i=start;i<text.length;i++){if(text[i]===opener)depth++;if(text[i]===closer)depth--;if(depth===0){try{return JSON.parse(text.substring(start,i+1));}catch(e){throw new Error('Malformed JSON.');}}}
  throw new Error('JSON truncated.');
}

// PDF text extraction (shared)
async function extractPdfText(file){
  const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;let out='';
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();out+='\n--- PAGE '+i+' ---\n'+tc.items.map(x=>x.str).join(' ');}
  return out;
}

async function extractPdfTextSpaced(file){
  const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const p=await pdf.getPage(i);const c=await p.getTextContent();
    const items=c.items;let result='';let lastX=-1,lastWidth=0,lastY=-1;
    for(const item of items){if(!item.str)continue;const x=item.transform?.[4]??0,y=item.transform?.[5]??0,fontSize=item.transform?.[0]??12;
      if(lastY!==-1&&Math.abs(y-lastY)>fontSize*0.5){result+='\n';lastX=-1;}
      if(lastX!==-1){const gap=x-(lastX+lastWidth);if(gap>fontSize*0.25)result+=' ';else if(gap<-fontSize*2)result+='\n';}
      result+=item.str;lastX=x;lastWidth=item.width??(item.str.length*fontSize*0.5);lastY=y;}
    text+=result+'\n\n';
  }
  return text;
}

async function getPdfPageCount(file){const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;return pdf.numPages;}

// Markdown to plain text
function markdownToPlainText(md){
  return md.replace(/^#{1,6}\s+/gm,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/`(.+?)`/g,'$1').replace(/```[\s\S]*?```/g,'').replace(/^\|.*\|$/gm,line=>{if(/^[\|\s:-]+$/.test(line))return'';return line.replace(/^\||\|$/g,'').split('|').map(c=>c.trim()).join('\t');}).replace(/^[-*+]\s+/gm,'\u2022 ').replace(/^>\s+/gm,'  ').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/---+/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
}

function sgBuildOverlap(prevExtractions){
  if(!prevExtractions.length)return'';const allText=prevExtractions.map(e=>e.data).join('\n');
  const condLines=allText.match(/^[-\u2022*]\s+.{3,80}$/gm)||[];const conditions=[...new Set(condLines.slice(0,40).map(l=>l.replace(/^[-\u2022*]\s+/,'').trim()))].join(', ');
  const medMatches=allText.match(/\b[A-Z][a-z]+(?:ol|in|ine|ide|ate|one|pam|lam|ril|tan|pin|mab|nib|cin|tin)\b/g)||[];const meds=[...new Set(medMatches)].slice(0,30).join(', ');
  const valueMatches=allText.match(/\d+[\.\d]*\s*(?:mg|mcg|mEq|mm\s*Hg|bpm|mL|%|units|hours?|minutes?|days?|mmol|mg\/dL|mEq\/L)/gi)||[];const values=[...new Set(valueMatches)].slice(0,25).join('; ');
  return SG_OVERLAP_CONTEXT.replace('{CONDITIONS}',conditions||'None yet').replace('{MEDS}',meds||'None yet').replace('{VALUES}',values||'None yet');
}

        })}
      </div>

      {error&&<div className="error-banner"><span>⚠</span><div><strong>Error:</strong> {error}{step==='processing'&&<div style={{marginTop:6,display:'flex',gap:6}}><button className="btn-secondary" onClick={resetAll} style={{padding:'5px 12px',fontSize:11}}>← Back</button>{extractionData&&<button className="btn-secondary" onClick={rerunSynthesis} style={{padding:'5px 12px',fontSize:11}}>↻ Retry Synthesis</button>}</div>}</div></div>}

      {/* Upload / Configure */}
      {step==='upload'&&<>
        <div className="upload-zone" onClick={()=>fileInputRef.current?.click()} onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('dragover');}} onDragLeave={e=>e.currentTarget.classList.remove('dragover')} onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('dragover');handleFiles(e.dataTransfer.files);}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 16V4m0 0l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          <h3>Drop PowerPoints & PDFs</h3><p>or click to browse</p>

        </div>

// ──── TOOL: Priority Analyzer ────
function paChunkText(text,chunkSize=12000,overlapSize=1500){
  let paragraphs=text.split(/\n{2,}/);if(paragraphs.length===1&&paragraphs[0].length>chunkSize)paragraphs=text.split(/\n/);
  const segments=[];
  for(const para of paragraphs){if(para.length<=chunkSize){segments.push(para);}else{const sentences=para.split(/(?<=[.!?])\s+/);let buf='';for(const sent of sentences){if(sent.length>chunkSize){if(buf){segments.push(buf);buf='';}for(let i=0;i<sent.length;i+=chunkSize)segments.push(sent.slice(i,i+chunkSize));}else if(buf.length+sent.length+1>chunkSize){segments.push(buf);buf=sent;}else{buf+=(buf?' ':'')+sent;}}if(buf)segments.push(buf);}}
  const chunks=[];let current='';let overlapBuffer='';
  for(const seg of segments){if(current.length+seg.length+2>chunkSize&&current.length>0){chunks.push(current.trim());const words=current.split(/\s+/);overlapBuffer='';for(let i=words.length-1;i>=0;i--){const c=words.slice(i).join(' ');if(c.length>overlapSize)break;overlapBuffer=c;}current=overlapBuffer?overlapBuffer+'\n\n'+seg:seg;}else{current+=(current?'\n\n':'')+seg;}}
  if(current.trim())chunks.push(current.trim());return chunks;
}

function paBuildExtractPrompt(chunk,idx,total,prevSummary){
  return `You are a nursing content analyst extracting priority data from a study guide chunk.\nThis is chunk ${idx+1} of ${total}.\n${prevSummary?`## Context from previous chunks\n${prevSummary}\n---\n`:''}\nAnalyze the content and extract every discrete testable concept. For each item, assign a tier:\n- **T1** — Safety-critical, NCLEX-priority, emergency interventions, delegation rules\n- **T2** — Core pathophysiology, standard assessments/interventions, common meds\n- **T3** — Background context, rarely tested details\n\nReturn a structured list:\n[T1/T2/T3] Item — Brief explanation\n\nGroup related items under topic subheadings. Be specific.\n\n## Content\n${chunk}`;
}

function paBuildSynthPrompt(extractions,context){
  const combined=extractions.map((e,i)=>`### Chunk ${i+1}\n${e}`).join('\n\n---\n\n');
  return `You are an expert nursing education content analyst specializing in Elsevier textbook pedagogy and NCLEX-style prioritization.\n\nYou have pre-extracted priority data from ${extractions.length} chunks. Each item is tagged T1/T2/T3.\n\nYour job:\n1. Deduplicate\n2. Resolve tier conflicts\n3. Re-evaluate using Elsevier hierarchy (pyramid points→T1, safety/drug alerts→T1, etc.)\n4. Organize under clear subheadings\n\nOutput in Markdown:\n\n## TIER 1 — Must Know\n[Items with WHY explanations]\n\n## TIER 2 — Should Know\n[Items]\n\n## TIER 3 — Good to Know\n[Items]\n\n---\n## Study Strategy\n3-5 bullet points.\n\n${context?`## Additional Context\n${context}\n\n`:''}\n## Extracted Data\n${combined}`;
}

function paParseTiers(text){
  const t1=text.match(/(?:^|\n)##?\s*(?:🔴\s*)?TIER\s*1[:\s\-—]*(.*?)(?=\n##?\s*(?:🟡\s*)?TIER\s*2|$)/si);
  const t2=text.match(/(?:^|\n)##?\s*(?:🟡\s*)?TIER\s*2[:\s\-—]*(.*?)(?=\n##?\s*(?:🔵\s*)?TIER\s*3|$)/si);
  const t3=text.match(/(?:^|\n)##?\s*(?:🔵\s*)?TIER\s*3[:\s\-—]*(.*?)$/si);
  if(!t1&&!t2&&!t3)return null;
  return{tier1:(t1?t1[1]:'').trim(),tier2:(t2?t2[1]:'').trim(),tier3:(t3?t3[1]:'').trim()};
}

function PriorityAnalyzer(){
  const cfg=useConfig();
  const [file,setFile]=useState(null);
  const [fileText,setFileText]=useState('');
  const [context,setContext]=useState('');
  const [chunkSize,setChunkSize]=useState(12000);
  const [overlapSize,setOverlapSize]=useState(1500);
  const [step,setStep]=useState('idle');
  const [progress,setProgress]=useState(0);
  const [phase,setPhase]=useState('');
  const [output,setOutput]=useState('');
  const [parsedTiers,setParsedTiers]=useState(null);
  const [chunks,setChunks]=useState([]);
  const [error,setError]=useState('');
  const fRef=useRef(null);

  const handleFile=useCallback(async f=>{
    setFile(f);
    try{
      if(f.name.toLowerCase().endsWith('.pdf')){setFileText(await extractPdfText(f));}
      else{const r=new FileReader();r.onload=()=>{let t=r.result;if(f.name.endsWith('.html')||f.name.endsWith('.htm')){const d=document.createElement('div');d.innerHTML=t;t=d.textContent||'';}setFileText(t);};r.readAsText(f);}
    }catch(e){setFileText('');setError('Could not read file: '+e.message);}
  },[]);

  async function runAnalysis(){
    if(!cfg.apiKey||!fileText)return;
    const textChunks=paChunkText(fileText,chunkSize,overlapSize);const total=textChunks.length;
    const chunkItems=[...textChunks.map((_,i)=>({id:`ext-${i}`,name:`Chunk ${i+1}/${total}`,phase:'extraction',status:'pending'})),{id:'synthesis',name:'Final Synthesis',phase:'synthesis',status:'pending'}];
    setStep('processing');setProgress(0);setPhase(`${total} chunks`);setOutput('');setParsedTiers(null);setError('');setChunks(chunkItems);
    const totalSteps=total+1;let completed=0;const extractions=[];
    try{
      for(let i=0;i<total;i++){
        setChunks(p=>p.map(c=>c.id===`ext-${i}`?{...c,status:'running'}:c));setPhase(`Extracting chunk ${i+1}/${total}...`);setProgress(Math.floor(completed/totalSteps*90));
        let prevSummary='';if(extractions.length>0){const last=extractions[extractions.length-1];prevSummary=last.length>2000?last.slice(0,2000)+'\n[...truncated]':last;}
        try{
          const prompt=paBuildExtractPrompt(textChunks[i],i,total,prevSummary);
          const result=await callGemini(cfg.apiKey,cfg.flashModel,[{text:prompt}],false,null);
          extractions.push(result);setChunks(p=>p.map(c=>c.id===`ext-${i}`?{...c,status:'done'}:c));
        }catch(err){setChunks(p=>p.map(c=>c.id===`ext-${i}`?{...c,status:'error'}:c));extractions.push(`[ERROR: ${err.message}]`);}
        completed++;setProgress(Math.floor(completed/totalSteps*90));
      }
      setChunks(p=>p.map(c=>c.id==='synthesis'?{...c,status:'running'}:c));setPhase('Synthesizing...');
      const synthPrompt=paBuildSynthPrompt(extractions,context);
      const synthModel=cfg.thinkingMode?cfg.proModel:cfg.flashModel;
      const full=await callGemini(cfg.apiKey,synthModel,[{text:synthPrompt}],cfg.thinkingMode,cfg.thinkingLevel);
      setOutput(full);setParsedTiers(paParseTiers(full));setChunks(p=>p.map(c=>c.id==='synthesis'?{...c,status:'done'}:c));setProgress(100);setStep('results');
    }catch(e){setError(e.message);setStep('error');}
  }

  const copyOutput=()=>navigator.clipboard?.writeText(output);
  const downloadMd=()=>{const blob=new Blob([output],{type:'text/markdown'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`priority-analysis.md`;a.click();URL.revokeObjectURL(url);};
  const resetAll=()=>{setStep('idle');setOutput('');setParsedTiers(null);setError('');setProgress(0);setChunks([]);};

  const tiers=parsedTiers;
  const renderedHTML=output?marked.parse(output):'';

  return(
    <div className="tool-panel">
      <h2 className="tool-title">Pyramid Priority Analyzer</h2>

            <div className="sb-label">Study Guide</div>

              <input ref={fRef} type="file" accept=".md,.txt,.html,.htm,.pdf" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}}/>
              {file?<><div style={{fontSize:11,color:'var(--accent-green)',fontWeight:600}}>✓ Loaded</div><div style={{fontSize:11,fontFamily:'JetBrains Mono',color:'var(--text)',marginTop:4,wordBreak:'break-all'}}>{file.name}</div><div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>{formatSize(file.size)}</div></>:<><div style={{fontSize:24,marginBottom:4,opacity:.5}}>📄</div><p style={{fontSize:11,color:'var(--text-dim)'}}>Drop .md, .txt, .html, .pdf</p></>}
            </div>

            <div className="sb-label">Extra Context</div>

          </div>
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16,marginBottom:12}}>
            <div className="sb-label">Chunking</div>
            <div className="sb-field"><label>Chunk size</label><input type="number" value={chunkSize} onChange={e=>setChunkSize(parseInt(e.target.value)||12000)}/></div>

        </div>

            </>:<div className="output-container"><div className="output-toolbar"><h3>Full Analysis</h3></div><div className="output-body" dangerouslySetInnerHTML={{__html:renderedHTML}}/></div>}

function ankiChunkText(text,max=12000,overlapPages=2){
  const raw=text.split(/\n--- PAGE \d+ ---\n/).filter(Boolean);if(raw.length===0)return[text];
  const pageGroups=[];let curGroup=[],curLen=0;
  for(let i=0;i<raw.length;i++){if(curLen+raw[i].length>max&&curGroup.length>0){pageGroups.push([...curGroup]);curGroup=[];curLen=0;}curGroup.push(i);curLen+=raw[i].length;}
  if(curGroup.length>0)pageGroups.push(curGroup);if(pageGroups.length<=1)return[raw.join('\n').trim()];
  const chunks=[];
  for(let g=0;g<pageGroups.length;g++){let pi=[...pageGroups[g]];if(g>0&&overlapPages>0){const prev=pageGroups[g-1];const os=Math.max(0,prev.length-overlapPages);const oi=prev.slice(os);const ex=new Set(pi);pi=[...oi.filter(idx=>!ex.has(idx)),...pi];}chunks.push(pi.map(idx=>raw[idx]).join('\n').trim());}
  return chunks;
}

function ankiParseCards(raw){
  const cbr=/```[\s\S]*?\n([\s\S]*?)```/g;const blocks=[];let m;while((m=cbr.exec(raw))!==null)blocks.push(m[1].trim());
  const ankiBlock=blocks[0]||raw;const cards=[];
  for(const line of ankiBlock.split('\n')){const t=line.trim();if(!t||!t.includes('|'))continue;const pts=t.split('|');if(pts.length>=2)cards.push({id:crypto.randomUUID(),text:pts[0].trim(),extra:(pts[1]||'').trim(),tags:(pts[2]||'').trim(),keep:true});}
  return{cards,ledger:blocks[1]||''};
}

function TierBadge({tier}){
  const cls=tier==='1'?'t1':tier==='2'?'t2':tier==='3'?'t3':'';
  const label=tier==='1'?'T1':tier==='2'?'T2':tier==='3'?'T3':'?';
  return <span className={`tier-badge ${cls}`}>{label}</span>;
}

  const del=useCallback(id=>setCards(p=>p.filter(c=>c.id!==id)),[]);
  const updateField=useCallback((id,f,v)=>setCards(p=>p.map(c=>c.id===id?{...c,[f]:v}:c)),[]);

  const exportTxt=useCallback(()=>{
    const kept=(tierFilter!=='all'?filteredCards:cards).filter(c=>c.keep);if(!kept.length)return;
    const blob=new Blob([kept.map(c=>`${c.text} | ${c.extra} | ${c.tags}`).join('\n')],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`latte_anki_import${tierFilter!=='all'?'_tier'+tierFilter:''}.txt`;a.click();URL.revokeObjectURL(a.href);
  },[cards,filteredCards,tierFilter]);

  const keptCount=cards.filter(c=>c.keep).length;

  return(
    <div className="tool-panel">
      <h2 className="tool-title">LATTE Anki Generator</h2>
      <p className="tool-desc">Upload PDFs → Anki cloze cards with LATTE tagging, tier system, and coverage ledger</p>

      {/* Upload */}
      <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:18,marginBottom:14}}>
        <div className="upload-zone" onClick={()=>fRef.current?.click()} onDragOver={e=>{e.preventDefault();e.currentTarget.classList.add('dragover');}} onDragLeave={e=>e.currentTarget.classList.remove('dragover')} onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove('dragover');addFiles(e.dataTransfer.files);}}>
          <input ref={fRef} type="file" accept=".pdf,image/*" multiple style={{display:'none'}} onChange={e=>{addFiles(e.target.files);e.target.value='';}}/>
          <div style={{fontSize:28,marginBottom:4,opacity:.6}}>📄</div>
          <p style={{fontSize:12,color:'var(--text)'}}>Drop PDFs or images, or <strong style={{color:'var(--accent)'}}>click to browse</strong></p>
        </div>
        {files.map((f,i)=><div className="file-chip" key={i}><div className={`f-icon ${f.type.startsWith('image/')?'txt':'pdf'}`}>{f.type.startsWith('image/')?'IMG':'PDF'}</div><span className="f-name">{f.name}</span><span className="f-size">{formatSize(f.size)}</span><button className="f-rm" onClick={()=>setFiles(p=>p.filter((_,j)=>j!==i))}>×</button></div>)}

        {/* Optional focus context fields */}
        <div style={{marginTop:12,padding:14,background:'var(--bg-input)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}}>
          <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--text-dim)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
            <span>Focus Context</span><span className="badge-opt">optional</span>
          </div>
          <div style={{fontSize:10,color:'var(--text-dim)',lineHeight:1.5,marginBottom:10}}>
            Guide card generation toward specific topics. Works for nursing <em>and</em> non-nursing content (A&P, chemistry, etc.) — when non-nursing content is detected, LATTE tags adapt to match the subject.
          </div>
          <div className="field-block" style={{marginBottom:8}}>
            <label style={{fontSize:11}}>Outcomes <span className="badge-opt">optional</span></label>
            <textarea rows={3} value={outcomes} onChange={e=>setOutcomes(e.target.value)} placeholder={"e.g.:\n1. Describe the structure and function of skeletal muscle\n2. Explain the sliding filament mechanism"}/>
          </div>
          <div className="field-block" style={{marginBottom:8}}>
            <label style={{fontSize:11}}>Points <span className="badge-opt">optional</span></label>
            <textarea rows={3} value={points} onChange={e=>setPoints(e.target.value)} placeholder={"\u2022 Sarcomere structure (A-band, I-band, Z-disc)\n\u2022 Neuromuscular junction\n\u2022 Calcium role in contraction"}/>
          </div>
          <div className="field-block">
            <label style={{fontSize:11}}>Additional Context <span className="badge-opt">optional</span></label>
            <textarea rows={2} value={focusContext} onChange={e=>setFocusContext(e.target.value)} placeholder="e.g. 'Focus on Ch. 10 only' or 'Exam covers cardiac system' or 'This is a chemistry textbook'"/>
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button className="btn-primary" onClick={run} disabled={busy||!files.length||!cfg.apiKey}>{busy?'⟳ Processing...':'▶ Generate Cards'}</button>
          {files.length>0&&!busy&&<button className="btn-secondary" onClick={()=>setFiles([])}>Clear</button>}
        </div>
      </div>

      {/* Progress */}
      {(busy||logs.length>0)&&<div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16,marginBottom:14}}>
        <div className="progress-bar"><div className="progress-fill" style={{width:prog+'%'}}/></div>
        <div style={{fontSize:10,color:'var(--text-dim)',margin:'6px 0'}}>{Math.round(prog)}%</div>
        <div style={{maxHeight:140,overflowY:'auto',fontFamily:'JetBrains Mono',fontSize:10.5,background:'var(--bg-deep)',border:'1px solid var(--border)',borderRadius:6,padding:8,lineHeight:1.8}}>
          {logs.map((l,i)=><div key={i} style={{color:l.t==='ok'?'var(--accent-green)':l.t==='err'?'var(--accent-red)':l.t==='warn'?'var(--accent-warm)':'var(--text-dim)'}}>[{l.ts}] {l.msg}</div>)}
        </div>
      </div>}

      {/* Cards */}
      {cards.length>0&&<div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:18}}>
        <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--text-dim)',fontWeight:500}}>TIERS:</span>
          {['1','2','3'].map(t=><button key={t} className={`tier-btn t${t} ${tierFilter===t?'active':''}`} onClick={()=>setTierFilter(tierFilter===t?'all':t)}>T{t} <b>{tierCounts[t]}</b></button>)}
          {tierFilter!=='all'&&<button className="btn-secondary" style={{padding:'3px 8px',fontSize:10}} onClick={()=>setTierFilter('all')}>Show All</button>}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:6}}>
          <span style={{fontSize:12,color:'var(--text-dim)'}}><b style={{color:'var(--text)'}}>{filteredCards.length}</b> cards · <b style={{color:'var(--accent-green)'}}>{keptCount}</b> kept</span>
          <div style={{display:'flex',gap:6}}>
            <div style={{display:'flex',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
              {['table','list'].map(v=><button key={v} onClick={()=>setView(v)} style={{background:view===v?'var(--accent)':'none',border:'none',color:view===v?'#fff':'var(--text-dim)',padding:'4px 12px',fontSize:11,cursor:'pointer',fontFamily:'DM Sans',fontWeight:500}}>{v==='table'?'Table':'List'}</button>)}
            </div>
            <button className="btn-primary" style={{padding:'6px 14px',fontSize:12}} onClick={exportTxt}>⬇ Export .txt</button>
          </div>
        </div>

        {view==='table'&&<div className="anki-tbl-wrap"><table><thead><tr><th style={{width:36}}>✓</th><th style={{width:38}}>Tier</th><th>Text</th><th style={{width:'16%'}}>Extra</th><th style={{width:'16%'}}>Tags</th><th style={{width:36}}></th></tr></thead><tbody>
          {filteredCards.map(c=><tr key={c.id} className={c.keep?'':'dim'}><td><input type="checkbox" checked={c.keep} onChange={()=>toggle(c.id)} style={{accentColor:'var(--accent)'}}/></td><td><TierBadge tier={getTier(c.tags)}/></td><td><textarea className="cell-ta" value={c.text} rows={2} onChange={e=>updateField(c.id,'text',e.target.value)}/></td><td><textarea className="cell-ta" value={c.extra} rows={2} onChange={e=>updateField(c.id,'extra',e.target.value)}/></td><td><textarea className="cell-ta tags-ta" value={c.tags} rows={2} onChange={e=>updateField(c.id,'tags',e.target.value)}/></td><td><button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13}} onClick={()=>del(c.id)}>×</button></td></tr>)}
        </tbody></table></div>}

        {view==='list'&&filteredCards.map(c=><div key={c.id} style={{display:'flex',gap:8,padding:'10px 12px',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,marginBottom:4,fontSize:12,opacity:c.keep?1:.35}}>
          <input type="checkbox" checked={c.keep} onChange={()=>toggle(c.id)} style={{accentColor:'var(--accent)',marginTop:2}}/>
          <TierBadge tier={getTier(c.tags)}/>
          <div style={{flex:1,minWidth:0}}><div style={{fontFamily:'JetBrains Mono',fontSize:11,lineHeight:1.5,wordBreak:'break-word'}}>{c.text}</div>{c.extra&&<div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>Extra: {c.extra}</div>}{c.tags&&<div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:4}}>{c.tags.split(/\s+/).map((t,j)=><span key={j} style={{fontSize:8,padding:'1px 6px',borderRadius:8,background:'var(--bg-card-alt)',color:'var(--text-dim)',border:'1px solid var(--border)'}}>{t}</span>)}</div>}</div>
          <button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13,flexShrink:0}} onClick={()=>del(c.id)}>×</button>
        </div>)}
      </div>}

      {ledger&&<div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16,marginTop:14}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--text-dim)',marginBottom:8}}>Coverage Ledger</div>
        <pre style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--text-dim)',whiteSpace:'pre-wrap',lineHeight:1.6,maxHeight:220,overflowY:'auto',background:'var(--bg-deep)',padding:10,borderRadius:6,border:'1px solid var(--border)'}}>{ledger}</pre>
      </div>}
    </div>
  );
}

// ──── TOOL: Deck Merger ────
const DM_SYSTEM=`You are an expert in Anki flashcard deck creation, cloze deletion formatting, and nursing education \u2014 specifically LPN-to-RN bridge programs and HESI exam preparation.

Key rules you always follow:
- Preserve original cloze formatting exactly: {{c1::text}}, {{c2::text::hint}}, etc.
- Preserve all tab-separated fields in Anki export lines \u2014 never reorder, drop, or merge fields.
- When producing JSON output, return ONLY valid JSON with no markdown fences, no preamble, no trailing text.
- When tagging for bridge relevance, use hierarchical Anki tags with :: separators (e.g., bridge::lpn_to_rn, hesi::relevant).
- Prioritize RN-scope content: pathophysiology depth, pharmacology mechanisms, assessment skills, critical thinking, delegation, and prioritization.`;

function dmParseAnkiTxt(rawText){
  const lines=rawText.split('\n');const cards=[];const metadata=[];
  for(const line of lines){const t=line.trim();if(!t)continue;if(t.startsWith('#')){metadata.push(t);continue;}
    const fields=t.split('\t');let tags='';const ti=fields.findIndex(f=>f.trim().toLowerCase().startsWith('tags:'));
    if(ti>=0){tags=fields[ti].replace(/^tags:\s*/i,'').trim();fields.splice(ti,1);}
    cards.push({rawLine:t,fields,text:fields[0]||'',tags});}
  return{cards,metadata};
}

function dmChunkArray(arr,size){const c=[];for(let i=0;i<arr.length;i+=size)c.push(arr.slice(i,i+size));return c;}

function DeckMerger(){
  const cfg=useConfig();
  const [file1,setFile1]=useState(null);
  const [file2,setFile2]=useState(null);
  const [text1,setText1]=useState('');
  const [text2,setText2]=useState('');
  const [parsed1,setParsed1]=useState(null);
  const [parsed2,setParsed2]=useState(null);
  const [batchSize,setBatchSize]=useState(50);
  const [step,setStep]=useState(0);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [analysis,setAnalysis]=useState(null);
  const [cards,setCards]=useState([]);
  const [selected,setSelected]=useState(new Set());
  const [batchProg,setBatchProg]=useState({current:0,total:0});
  const [searchQ,setSearchQ]=useState('');

  const model=cfg.thinkingMode?cfg.proModel:cfg.flashModel;
  const thinkLvl=cfg.thinkingMode?cfg.thinkingLevel:null;

  useEffect(()=>{if(file1)file1.text().then(t=>{setText1(t);setParsed1(dmParseAnkiTxt(t));});},[file1]);
  useEffect(()=>{if(file2)file2.text().then(t=>{setText2(t);setParsed2(dmParseAnkiTxt(t));});},[file2]);

  const filteredCards=useMemo(()=>{if(!searchQ.trim())return cards;const q=searchQ.toLowerCase();return cards.filter(c=>(c.text||'').toLowerCase().includes(q)||(c.tags||'').toLowerCase().includes(q));},[cards,searchQ]);

  async function dmCallGemini(prompt){
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cfg.apiKey}`;
    const body={system_instruction:{parts:[{text:DM_SYSTEM}]},contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:65536}};
    if(thinkLvl)body.generationConfig.thinkingConfig={thinkingLevel:thinkLvl};
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'API '+res.status);}
    const data=await res.json();return data.candidates?.[0]?.content?.parts?.filter(p=>p.text&&!p.thought).map(p=>p.text).join('\n')||'';
  }

  async function handleAnalyze(){
    if(!cfg.apiKey){setError('Enter API key.');return;}if(!text1||!text2){setError('Upload both decks.');return;}
    setError('');setLoading(true);setStep(1);
    try{
      const prompt=`Analyze two Anki decks.\nDeck A (${parsed1?.cards?.length} cards):\n\`\`\`\n${text1.slice(0,8000)}\n\`\`\`\nDeck B (${parsed2?.cards?.length} cards):\n\`\`\`\n${text2.slice(0,8000)}\n\`\`\`\nReturn JSON: {"deck1":{"name":"","totalCards":0,"tags":[],"topicSummary":""},"deck2":{"name":"","totalCards":0,"tags":[],"topicSummary":""},"comparison":{"estimatedDuplicateCards":0,"complementaryStrengths":""},"bridgeRelevance":{"lpnToRnTopics":[],"gapAnalysis":""}}\nReturn ONLY valid JSON.`;
      const result=await dmCallGemini(prompt);setAnalysis(extractJSON(result));setStep(2);
    }catch(err){setError('Analysis failed: '+err.message);setStep(0);}finally{setLoading(false);}
  }

  async function handleMerge(){
    if(!analysis)return;setLoading(true);setStep(3);
    try{
      const allParsed=[...(parsed1?.cards||[]).map(c=>({...c,source:'deck1'})),...(parsed2?.cards||[]).map(c=>({...c,source:'deck2'}))];
      const batches=dmChunkArray(allParsed,batchSize);let allMerged=[];
      setBatchProg({current:0,total:batches.length});
      for(let i=0;i<batches.length;i++){
        setBatchProg({current:i+1,total:batches.length});
        const batch=batches[i];const batchText=batch.map((c,idx)=>`[${idx}|${c.source}] ${c.rawLine}`).join('\n');
        const prompt=`Process this batch for an LPN→RN merged deck.\nBatch (${batch.length} cards):\n${batchText}\n\nFor each card: KEEP if relevant, SKIP if near-duplicate.\nReturn JSON array: [{"rawLine":"exact original","tags":"unified tags","source":"deck1/deck2","category":"label","action":"keep/skip"}]`;
        const result=await dmCallGemini(prompt);const parsed=extractJSON(result);
        const kept=(Array.isArray(parsed)?parsed:(parsed.cards||[])).filter(c=>c.action!=='skip');
        allMerged=[...allMerged,...kept];
      }
      const final=allMerged.map((c,i)=>({...c,id:i,text:c.rawLine||c.text||''}));
      setCards(final);setSelected(new Set(final.map(c=>c.id)));setStep(4);
    }catch(err){setError('Merge failed: '+err.message);setStep(2);}finally{setLoading(false);setBatchProg({current:0,total:0});}
  }

  function handleExport(){
    const sel=cards.filter(c=>selected.has(c.id));if(!sel.length){setError('No cards selected.');return;}
    const lines=['#separator:tab','#html:true','#notetype:Cloze',''];
    sel.forEach(card=>{let cl=card.rawLine||card.text||'';const tags=(card.tags||'').trim();if(tags&&!cl.toLowerCase().includes('tags:')){cl+=(cl.includes('\t')?'\t':'\t\t')+'tags: '+tags;}lines.push(cl);});
    const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='merged_deck.txt';document.body.appendChild(a);a.click();a.remove();
  }

  const toggleSelect=id=>setSelected(p=>{const n=new Set(p);if(n.has(id))n.delete(id);else n.add(id);return n;});

  function UploadZone({label,file,onFile,cardCount}){
    const iRef=useRef(null);
    return <div onClick={()=>iRef.current?.click()} style={{border:`2px dashed ${file?'var(--accent-green)':'var(--border)'}`,borderRadius:'var(--radius-lg)',padding:'24px 16px',textAlign:'center',cursor:'pointer',background:file?'rgba(52,211,153,.04)':'var(--bg-card)',transition:'all .2s',flex:1}}>
      <input ref={iRef} type="file" accept=".txt" style={{display:'none'}} onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);}}/>
      {file?<><div style={{fontSize:11,color:'var(--accent-green)',fontWeight:600}}>✓ Loaded</div><div style={{fontSize:12,fontWeight:500,marginTop:4}}>{file.name}</div><div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>{formatSize(file.size)}{cardCount!==undefined?` · ${cardCount} cards`:''}</div></>:<><div style={{fontSize:24,marginBottom:4,opacity:.5}}>📄</div><div style={{fontSize:13,fontWeight:500,color:'var(--text-dim)'}}>{label}</div><div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>Drop .txt Anki export</div></>}
    </div>;
  }

  return(
    <div className="tool-panel">
      <h2 className="tool-title">Anki Deck Merger</h2>
      <p className="tool-desc">Upload two Anki .txt exports → AI-powered analysis, deduplication, and merged deck</p>

      {/* Progress bar */}
      <div style={{display:'flex',gap:3,marginBottom:20}}>{['Upload','Analyze','Results','Merge','Export'].map((s,i)=><div key={s} style={{flex:1}}><div style={{height:3,borderRadius:2,background:i<=step?'var(--accent)':'var(--border)',transition:'background .3s'}}/><div style={{fontSize:9,color:i<=step?'var(--accent)':'var(--text-dim)',marginTop:3,textTransform:'uppercase',letterSpacing:'.3px'}}>{s}</div></div>)}</div>

      {error&&<div className="error-banner" style={{marginBottom:14}}><span>⚠</span><div style={{flex:1}}>{error}</div><button onClick={()=>setError('')} style={{background:'none',border:'none',color:'var(--accent-red)',cursor:'pointer',fontSize:14}}>×</button></div>}

      {/* Step 0: Upload */}
      {step===0&&<>
        <div style={{display:'flex',gap:12,marginBottom:16}}><UploadZone label="Deck A" file={file1} onFile={setFile1} cardCount={parsed1?.cards?.length}/><UploadZone label="Deck B" file={file2} onFile={setFile2} cardCount={parsed2?.cards?.length}/></div>
        {parsed1&&parsed2&&<div style={{textAlign:'center'}}><button className="btn-primary" onClick={handleAnalyze}>⚡ Analyze & Compare Decks</button></div>}
      </>}

      {/* Step 1: Loading */}
      {step===1&&loading&&<div style={{textAlign:'center',padding:40}}><div className="spinner" style={{width:28,height:28,marginBottom:12}}/><div style={{fontSize:14,fontWeight:500}}>Analyzing decks...</div><div style={{fontSize:11,color:'var(--text-dim)',marginTop:4}}>Using {model}</div></div>}

      {/* Step 2: Analysis results */}
      {step===2&&analysis&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          {['deck1','deck2'].map((dk,di)=>{const d=analysis[dk];return <div key={dk} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16}}>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}><span className={`tier-badge ${di===0?'t3':'t2'}`}>Deck {di===0?'A':'B'}</span><span style={{fontSize:13,fontWeight:600}}>{d?.name||'Deck '+(di+1)}</span></div>
            <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:10,lineHeight:1.6}}>{d?.topicSummary}</div>
            <div className="stat-box"><span className="stat-val">{d?.totalCards||'?'}</span><span className="stat-lbl">Cards</span></div>
          </div>;})}
        </div>
        {analysis.comparison&&<div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:16,marginBottom:14}}>
          <h3 style={{fontSize:13,fontWeight:600,color:'var(--text-bright)',marginBottom:10}}>Overlap & Differences</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div className="stat-box"><span className="stat-val" style={{color:'var(--accent-red)'}}>{analysis.comparison.estimatedDuplicateCards||0}</span><span className="stat-lbl">Est. Duplicates</span></div>
            <div className="stat-box"><span className="stat-val" style={{color:'var(--accent)'}}>{analysis.comparison.sharedTags?.length||0}</span><span className="stat-lbl">Shared Tags</span></div>
          </div>
          {analysis.comparison.complementaryStrengths&&<div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.6,padding:10,background:'var(--bg-card-alt)',borderRadius:6}}>{analysis.comparison.complementaryStrengths}</div>}
        </div>}
        {analysis.bridgeRelevance?.gapAnalysis&&<div style={{background:'var(--bg-card)',border:'1px solid var(--accent)',borderLeftWidth:3,borderRadius:'var(--radius-lg)',padding:16,marginBottom:14}}>
          <h3 style={{fontSize:13,fontWeight:600,color:'var(--accent)',marginBottom:8}}>LPN→RN Bridge Relevance</h3>
          <div style={{fontSize:12,color:'var(--text)',lineHeight:1.7}}>{analysis.bridgeRelevance.gapAnalysis}</div>
        </div>}
        <div style={{textAlign:'center'}}><button className="btn-primary" onClick={handleMerge}>🔀 Build Merged Deck</button></div>
      </>}

      {/* Step 3: Merging */}
      {step===3&&loading&&<div style={{textAlign:'center',padding:40}}>
        <div className="spinner" style={{width:28,height:28,marginBottom:12}}/><div style={{fontSize:14,fontWeight:500}}>Merging cards...</div>
        {batchProg.total>1&&<div style={{maxWidth:300,margin:'12px auto'}}><div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text-dim)'}}><span>Batch {batchProg.current}/{batchProg.total}</span><span>{Math.round(batchProg.current/batchProg.total*100)}%</span></div><div className="progress-bar" style={{marginTop:4}}><div className="progress-fill" style={{width:`${batchProg.current/batchProg.total*100}%`}}/></div></div>}
      </div>}

      {/* Step 4: Review & Export */}
      {step===4&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3 style={{fontSize:15,fontWeight:600,color:'var(--text-bright)'}}>Merged Deck</h3>
          <span style={{fontSize:12,color:'var(--text-dim)'}}>{selected.size}/{cards.length} selected</span>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>

const NCLEX_INLINE_PROMPT=`You are an expert nursing educator. From the following text chunk of an NCLEX-style review book, extract EVERY test question.\n\nFor EACH question, return a JSON object with:\n- "question": full question text with all choices\n- "correct_answer": correct answer letter and text\n- "rationale": full rationale\n- "priority_nursing_tip": any tip mentioned (or null)\n- "test_taking_strategy": strategy mentioned (or null)\n- "clinical_judgment_skill": CJ skill identified (or null)\n- "diseases_conditions": array of conditions referenced\n- "keywords": important nursing keywords\n\nThis chunk may overlap with a previous chunk. Do NOT return duplicates.\nReturn ONLY a valid JSON array. No markdown fences. If no questions found, return [].\n\nTEXT CHUNK:\n`;

const NCLEX_SPLIT_PROMPT=`You are an expert nursing educator. Below are NCLEX-style questions that have been PRE-MATCHED with their corresponding answers and rationales. The questions were originally on separate pages from their answers and have been paired by question number.\n\nFor EACH question+answer pair, return a JSON object with:\n- "question_number": original question number\n- "question": full question text with all choices\n- "correct_answer": correct answer letter and text\n- "rationale": full rationale\n- "priority_nursing_tip": any tip mentioned (or null)\n- "test_taking_strategy": strategy mentioned (or null)\n- "clinical_judgment_skill": CJ skill identified (or null)\n- "diseases_conditions": array of conditions referenced\n- "keywords": important nursing keywords\n\nReturn ONLY a valid JSON array. No markdown fences. If no valid pairs found, return [].\n\nPAIRED QUESTIONS AND ANSWERS:\n`;

const NCLEX_AI_PAIR_PROMPT=`You are a text-matching assistant. Below are two sections from a nursing test book:\n1. QUESTIONS section - contains numbered test questions\n2. ANSWERS section - contains numbered answers and rationales\n\nMatch each question number with its answer. Return a JSON array where each object has:\n- "number": question number (integer)\n- "question": full question text with all choices\n- "answer": full answer text with rationale\n\nReturn ONLY a valid JSON array. No markdown.\n\nQUESTIONS SECTION:\n`;

function nclexChunkText(text,size,overlap){
  const chunks=[];let i=0;
  while(i<text.length){let end=Math.min(i+size,text.length);if(end<text.length){const nl=text.lastIndexOf('\n',end);if(nl>i+size*0.5)end=nl+1;}chunks.push(text.slice(i,end));i+=Math.max(size-overlap,size*0.3);}
  return chunks;
}

function nclexDedup(questions){
  const seen=new Set();return questions.filter(q=>{if(!q.question)return false;const k=q.question.replace(/\s+/g,' ').trim().slice(0,120).toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
}

// Split-mode: extract text from specific page ranges
async function nclexExtractPageRange(file,startPage,endPage){
  const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const s=Math.max(1,startPage),e=Math.min(pdf.numPages,endPage);let text='';
  for(let i=s;i<=e;i++){
    const p=await pdf.getPage(i);const c=await p.getTextContent();
    const items=c.items;let result='';let lastX=-1,lastWidth=0,lastY=-1;
    for(const item of items){if(!item.str)continue;const x=item.transform?.[4]??0,y=item.transform?.[5]??0,fontSize=item.transform?.[0]??12;
      if(lastY!==-1&&Math.abs(y-lastY)>fontSize*0.5){result+='\n';lastX=-1;}
      if(lastX!==-1){const gap=x-(lastX+lastWidth);if(gap>fontSize*0.25)result+=' ';else if(gap<-fontSize*2)result+='\n';}
      result+=item.str;lastX=x;lastWidth=item.width??(item.str.length*fontSize*0.5);lastY=y;}
    text+=result+'\n\n';
  }
  return text;
}

// Multi-pattern question number detection
function nclexSplitByQNum(text){
  const patterns=[/(?:^|\n)\s*(\d{1,4})\s*\.\s/g,/(?:^|\n)\s*(\d{1,4})\)\s/g,/(?:^|\n)\s*Q(?:uestion)?\s*#?\s*(\d{1,4})[.):;\s]/gi,/(?:^|\n)\s*#\s*(\d{1,4})[.):;\s]/g,/(?:^|\n)\s*\[(\d{1,4})\]/g];
  let bestItems={},bestCount=0;
  for(const bp of patterns){
    const pattern=new RegExp(bp.source,bp.flags);const items={};const positions=[];let m;
    while((m=pattern.exec(text))!==null){const num=parseInt(m[1]);if(num>0&&num<5000)positions.push({num,index:m.index});}
    for(let i=0;i<positions.length;i++){const start=positions[i].index;const end=i+1<positions.length?positions[i+1].index:text.length;if(!items[positions[i].num])items[positions[i].num]=text.slice(start,end).trim();}
    const count=Object.keys(items).length;if(count>bestCount){bestItems=items;bestCount=count;}
  }
  // Loose fallback
  if(bestCount<3){
    const loose=/(?:^|\n)\s{0,5}(\d{1,4})\s{0,3}[.):]/g;const items={};const positions=[];let m;
    while((m=loose.exec(text))!==null){const num=parseInt(m[1]);if(num>0&&num<5000)positions.push({num,index:m.index});}
    for(let i=0;i<positions.length;i++){const start=positions[i].index;const end=i+1<positions.length?positions[i+1].index:text.length;if(!items[positions[i].num])items[positions[i].num]=text.slice(start,end).trim();}
    if(Object.keys(items).length>bestCount){bestItems=items;bestCount=Object.keys(items).length;}
  }
  return bestItems;
}

function nclexPairQA(qText,aText){
  const questions=nclexSplitByQNum(qText),answers=nclexSplitByQNum(aText);
  return Object.keys(questions).map(Number).sort((a,b)=>a-b).map(num=>({number:num,question:questions[num]||'',answer:answers[num]||'',matched:!!answers[num]}));
}

function nclexBatchPairs(pairs,batchSize=8){const batches=[];for(let i=0;i<pairs.length;i+=batchSize)batches.push(pairs.slice(i,i+batchSize));return batches;}
function nclexPairsToText(pairs){return pairs.map(p=>{let s=`── Question #${p.number} ──\n${p.question}\n`;if(p.answer)s+=`\n── Answer #${p.number} ──\n${p.answer}\n`;return s;}).join('\n\n');}

      <span style={{fontSize:10,color:'var(--text-dim)'}}>to</span>
